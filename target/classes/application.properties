# application.properties - 配置文件
# 作用：配置网站的各项参数

# -------------------- 服务器配置 --------------------
# 服务器端口号，默认 8080
# 启动后访问: http://localhost:8080
server.port=8080

# -------------------- Thymeleaf 配置 --------------------
# Thymeleaf 模板文件存放位置
# Spring Boot 会自动去 resources/templates 下找 .html 文件
spring.thymeleaf.prefix=classpath:/templates/

# 模板文件后缀
spring.thymeleaf.suffix=.html

# 开发模式下关闭模板缓存，修改 HTML 后直接生效
spring.thymeleaf.cache=false

# -------------------- 请求配置 --------------------
# 请求编码设为 UTF-8，防止中文乱码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# -------------------- 静态资源 --------------------
# 静态资源（CSS、JS、图片）存放位置
spring.web.resources.static-locations=classpath:/static/

# -------------------- 会话配置 --------------------
# session 过期时间（秒），这里设为 30 分钟
server.servlet.session.timeout=30m

# -------------------- SQLite 数据库配置 --------------------
# 数据库文件路径（项目根目录）
spring.datasource.url=jdbc:sqlite:mywebsite.db?journal_mode=WAL
# 驱动类名
spring.datasource.driver-class-name=org.sqlite.JDBC
# 用户名（SQLite 不需要）
spring.datasource.username=
# 密码（SQLite 不需要）
spring.datasource.password=

# -------------------- JPA 配置 --------------------
# 自动建表（update: 有表则更新，无表则创建）
spring.jpa.hibernate.ddl-auto=update
# 显示 SQL 语句（方便调试）
spring.jpa.show-sql=true
# SQL 方言（SQLite 需要使用 SQLite 方言）
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
# 格式化 SQL
spring.jpa.properties.hibernate.format_sql=true
