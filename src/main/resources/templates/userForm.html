<!DOCTYPE html>
<!--
    userForm.html - 用户表单页面
    用于添加用户和编辑用户信息
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user == null or user.id == null} ? '添加用户' : '编辑用户'">用户表单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f6fa; height: 100vh; overflow: hidden; }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: #2c3e50; color: white; display: flex; flex-direction: column; transition: width 0.3s; overflow: hidden; flex-shrink: 0; }
        .sidebar.collapsed { width: 60px; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; min-height: 60px; }
        .sidebar-header .logo { font-size: 20px; font-weight: bold; white-space: nowrap; }
        .sidebar.collapsed .logo { display: none; }
        .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .nav-link { display: flex; align-items: center; padding: 12px 15px; color: rgba(255,255,255,0.7); text-decoration: none; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: rgba(255,255,255,0.15); color: white; }
        .nav-link .icon { font-size: 18px; width: 30px; flex-shrink: 0; text-align: center; }
        .nav-link .text { flex: 1; }
        .nav-link .arrow { font-size: 12px; transition: transform 0.2s; }
        .sidebar.collapsed .nav-link .text, .sidebar.collapsed .nav-link .arrow { display: none; }
        .submenu { display: none; background: rgba(0,0,0,0.2); }
        .submenu.open { display: block; }
        .submenu .nav-link { padding-left: 45px; font-size: 14px; }
        .submenu .nav-link .icon { width: 20px; }
        .header { height: 60px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .toggle-sidebar { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        .header-title { font-size: 18px; color: #333; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .header-user { color: #666; font-size: 14px; }
        .header-logout { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .header-logout:hover { background: #c0392b; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto; }
        .card h1 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group label .required { color: #e74c3c; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .form-group input:disabled { background: #f5f5f5; cursor: not-allowed; }
        .form-group .hint { margin-top: 5px; color: #999; font-size: 12px; }
        .error-msg { color: #e74c3c; font-size: 14px; margin-top: 5px; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 12px 20px; border-radius: 5px; font-size: 14px; cursor: pointer; text-decoration: none; border: none; transition: all 0.3s; text-align: center; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-secondary:hover { background: #7f8c8d; }
    </style>
</head>
<body>
    <div class="layout">
        <!-- 左侧导航栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">📚 门户网站</span>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item">
                    <a th:href="@{/main}" class="nav-link">
                        <span class="icon">🏠</span>
                        <span class="text">首页</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a class="nav-link active" onclick="toggleSubmenu('admin-submenu', this)">
                        <span class="icon">⚙️</span>
                        <span class="text">后台管理</span>
                        <span class="arrow">▼</span>
                    </a>
                    <div class="submenu open" id="admin-submenu">
                        <a th:href="@{/admin/users}" class="nav-link active">
                            <span class="icon">👥</span>
                            <span class="text">用户管理</span>
                        </a>
                        <a th:href="@{/admin/groups}" class="nav-link">
                            <span class="icon">📂</span>
                            <span class="text">分组管理</span>
                        </a>
                        <a th:href="@{/admin/permissions}" class="nav-link">
                            <span class="icon">🔐</span>
                            <span class="text">权限管理</span>
                        </a>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- 右侧内容区 -->
        <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <header class="header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                    <span class="header-title" th:text="${user == null or user.id == null} ? '添加用户' : '编辑用户'">用户表单</span>
                </div>
                <div class="header-right">
                    <span class="header-user" th:text="'欢迎，' + ${session.loginUser}">欢迎，用户</span>
                    <a th:href="@{/logout}" class="header-logout">退出登录</a>
                </div>
            </header>

            <main class="main-content">
                <div class="card">
                    <h1 th:text="${user == null or user.id == null} ? '➕ 添加用户' : '✏️ 编辑用户'">用户表单</h1>

                    <form th:action="${user == null or user.id == null} ? @{/admin/user/save} : @{/admin/user/update}" th:object="${user}" method="post">
                        <input type="hidden" th:if="${user != null and user.id != null}" th:field="*{id}" />
                        <input type="hidden" th:if="${user != null and user.id != null}" th:field="*{createdAt}" />

                        <!-- 用户名 -->
                        <div class="form-group">
                            <label>用户名 <span class="required">*</span></label>
                            <input type="text" th:field="*{username}" placeholder="请输入用户名" required th:disabled="${user != null and user.id != null}" />
                            <div class="hint" th:if="${user == null or user.id == null}">用户名一旦创建不能修改</div>
                            <div class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <!-- 密码 -->
                        <div class="form-group">
                            <label>密码 <span class="required" th:if="${user == null or user.id == null}">*</span></label>
                            <input type="password" th:field="*{password}" th:placeholder="${user == null or user.id == null} ? '请输入密码' : '留空则不修改密码'" th:required="${user == null or user.id == null}" />
                            <div class="hint" th:if="${user != null and user.id != null}">不修改密码请留空</div>
                        </div>

                        <!-- 确认密码（仅添加时显示） -->
                        <div class="form-group" th:if="${user == null or user.id == null}">
                            <label>确认密码 <span class="required">*</span></label>
                            <input type="password" name="confirmPassword" placeholder="请再次输入密码" required />
                        </div>

                        <!-- 角色选择 -->
                        <div class="form-group">
                            <label>角色 <span class="required">*</span></label>
                            <select th:field="*{isAdmin}" required>
                                <option value="0">普通用户</option>
                                <option value="1">管理员</option>
                            </select>
                        </div>

                        <!-- 状态（仅编辑时显示） -->
                        <div class="form-group" th:if="${user != null and user.id != null}">
                            <label>状态</label>
                            <select th:field="*{isDeleted}">
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                            </select>
                        </div>

                        <!-- 按钮组 -->
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" th:text="${user == null or user.id == null} ? '添加' : '保存'">提交</button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleSubmenu(id, element) {
            var submenu = document.getElementById(id);
            var arrow = element.querySelector('.arrow');
            if (submenu.classList.contains('open')) {
                submenu.classList.remove('open');
                arrow.style.transform = 'rotate(0deg)';
            } else {
                submenu.classList.add('open');
                arrow.style.transform = 'rotate(180deg)';
            }
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
