<!DOCTYPE html>
<!--
    login.html - 登录页面

    Thymeleaf 语法说明：
    - th:text="${变量名}"    : 替换文本内容
    - th:if="${条件}"       : 条件显示
    - th:action="@{/路径}"  : 表单提交地址
    - ${...}                : 从 Model/Controller 获取的数据
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        /* -------------------- 全局样式 -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* -------------------- 登录框样式 -------------------- */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* -------------------- 输入框样式 -------------------- */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* -------------------- 按钮样式 -------------------- */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        /* -------------------- 错误提示样式 -------------------- */
        .error-msg {
            background: #ffe0e0;
            color: #d63031;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 登录框容器 -->
    <div class="login-container">
        <h2>🔐 用户登录</h2>

        <!--
            错误提示 - th:if="${error}" 表示如果有 error 变量就显示
            当 Controller 登录失败时，会返回 error 信息
        -->
        <div th:if="${error}" class="error-msg">
            <span th:text="${error}">错误信息</span>
        </div>

        <!--
            登录表单
            th:action="@{/login}" - 提交到 /login（对应 Controller 的 @PostMapping("/login")）
            method="post"       - POST 请求方式
        -->
        <form th:action="@{/login}" method="post">
            <!-- 用户名输入框 -->
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="请输入用户名"
                       required>
            </div>

            <!-- 密码输入框 -->
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="请输入密码"
                       required>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="login-btn">登 录</button>
        </form>
    </div>
</body>
</html>
